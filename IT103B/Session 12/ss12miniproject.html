<body>
    <script>
        // c1
        function createStudent() {
            let id = prompt("Nhập id");
            let name = prompt("Nhập tên");
            let age = Number(prompt("Nhập tuổi"));
            let gpa = Number(prompt("Nhập gpa"));

            let student = {
                id: id,
                name: name,
                age: age,
                gpa: gpa,
                status: "active",
                createdAt: Date.now(),
                updatedAt: null,
                deletedAt: null
            };

            students.push(student);
            console.log("Đã thêm sinh viên");
        }

        // c2
        function updateStudent() {
            let id = prompt("Nhập id cần sửa");

            let student = students.find(s => s.id === id);

            if (!student) {
                console.log("Không tìm thấy");
                return;
            }

            let newName = prompt("Tên mới");
            let newAge = prompt("Tuổi mới");
            let newGpa = prompt("Gpa mới");

            if (newName !== "") student.name = newName;
            if (newAge !== "") student.age = Number(newAge);
            if (newGpa !== "") student.gpa = Number(newGpa);

            student.updatedAt = Date.now();

            console.log("Đã cập nhật");
        }

        // c3
        function softDeleteStudent() {
            let id = prompt("Nhập id cần xóa");

            let student = students.find(s => s.id === id);

            if (!student) {
                console.log("Không tìm thấy");
                return;
            }

            student.status = "inactive";
            student.deletedAt = Date.now();

            console.log("Đã soft delete");
        }

        // c4
        function restoreStudent() {
            let id = prompt("Nhập id cần khôi phục");

            let student = students.find(s => s.id === id);

            if (!student) {
                console.log("Không tìm thấy");
                return;
            }

            student.status = "active";
            student.deletedAt = null;
            student.updatedAt = Date.now();

            console.log("Đã khôi phục");
        }

        // c5
        function viewStudents() {
            let keyword = prompt("Tìm tên") || "";
            let statusFilter = prompt("Lọc status (all/active/inactive)") || "all";
            let sortType = prompt("Sort gpa (asc/desc)") || "asc";

            let data = [...students];

            data = data.filter(function (s) {
                return s.name.toLowerCase().includes(keyword.toLowerCase());
            });

            if (statusFilter !== "all") {
                data = data.filter(function (s) {
                    return s.status === statusFilter;
                });
            }
        }
            // c6
            function analytics() {
                alert("Analytics Dashboard");
            }

            let choice;
            do {
                choice = +prompt(`
                ==== STUDENT MANAGER ADVANCED ====
                1. Create Student
                2. Update Student
                3. Soft Delete Student
                4. Restore Student
                5. View Students
                6. Analytics Dashboard
                0. Exit.`);
                switch (choice) {
                    case 1:
                        createStudent();
                        break;
                    case 2:
                        updateStudent();
                        break;
                    case 3:
                        softDeleteStudent();
                        break;
                    case 4:
                        restoreStudent();
                        break;
                    case 5:
                        viewStudents();
                        break;
                    case 6:
                        analytics();
                        break;
                    case 0:
                        console.log(`Thoát.`);
                        break;
                }
            } while (choice !== 0);


    </script>
</body>
