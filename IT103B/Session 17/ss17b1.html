<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container {
            width: 350px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .header {
            background: #e53935;
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: bold;
        }

        .todo {
            display: flex;
            justify-content: space-between;
            padding: 12px;
        }

        .footer {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>Chuẩn bị Tết Nguyên Đán</h1>
        </header>
        <div id="todoList"></div>
        <footer class="footer">
            <p>Đã lưu vào localStorage lần đầu tiên . Refresh trang để kiểm tra</p>
        </footer>
    </div>

    <script>
        const todos = [
            { id: 1, task: "Mua bánh chưng", done: false },
            { id: 2, task: "Dọn nhà đón Tết", done: false },
            { id: 3, task: "Gói bánh chưng", done: false },
            { id: 4, task: "Trang trí nhà cửa", done: false }
        ];

        const list = document.getElementById("todoList");
        function renderTodos() {
            todos.forEach(todo => {
                list.innerHTML += `
                <ul>
                    <li>${todo.task} - Chưa làm</li>
                </ul>`;
            });
        }
        function saveFirstTime() {
            if (!localStorage.getItem("myTodos")) {
                localStorage.setItem("myTodos", JSON.stringify(todos));
            }
        }
        renderTodos();
        saveFirstTime();
    </script>
</body>

</html>
